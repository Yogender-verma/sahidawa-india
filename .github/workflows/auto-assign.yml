name: "Auto Issue Assigner & Prevention"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-assign-limit:
    runs-on: ubuntu-latest
    # Trigger only if comment contains "/assign", "please assign", or "assign me" (case-insensitive)
    if: >
      contains(github.event.comment.body, '/assign') ||
      contains(github.event.comment.body, 'please assign') ||
      contains(github.event.comment.body, 'assign me') ||
      contains(github.event.comment.body, 'Assign me') ||
      contains(github.event.comment.body, 'Please assign')
    
    steps:
      - name: Auto Assign Verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commenter = context.payload.comment.user.login;
            const issueNumber = context.issue.number;
            const repo = context.repo;

            console.log(`Processing assignment request from ${commenter} for issue #${issueNumber}...`);

            // 1. Check if the issue is already assigned
            const currentIssue = await github.rest.issues.get({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber
            });

            if (currentIssue.data.assignees && currentIssue.data.assignees.length > 0) {
              const assignedUser = currentIssue.data.assignees[0].login;
              if (assignedUser === commenter) {
                console.log(`Issue #${issueNumber} is already assigned to the commenter.`);
                return;
              }
              
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issueNumber,
                body: `⚠️ Hi @${commenter}, this issue is already assigned to @${assignedUser}. Please check out our other open issues! 🔍`
              });
              return;
            }

            // 2. Fetch all open issues in the repository assigned to this commenter
            const assignedIssues = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              assignee: commenter,
              state: 'open'
            });

            // Filter out pull requests (GitHub API lists PRs as issues)
            const activeAssignedIssues = assignedIssues.data.filter(issue => !issue.pull_request);

            if (activeAssignedIssues.length > 0) {
              const alreadyAssignedNum = activeAssignedIssues[0].number;
              const alreadyAssignedTitle = activeAssignedIssues[0].title;
              
              console.log(`Denying assignment: @${commenter} already holds active issue #${alreadyAssignedNum}.`);

              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issueNumber,
                body: `❌ **Assignment Denied**\n\nHi @${commenter}, to ensure fair opportunities for everyone participating in GSSoC/Hacktoberfest, contributors are limited to **1 active assigned issue** at a time.\n\nYou are currently assigned to active issue: **#${alreadyAssignedNum}** ("${alreadyAssignedTitle}").\n\nPlease submit a Pull Request or request to be unassigned from #${alreadyAssignedNum} before claiming another issue! Thank you for your cooperation! 🤝`
              });
              return;
            }

            // 3. If no active issue is held, assign them to this issue
            console.log(`Assigning issue #${issueNumber} to @${commenter}...`);

            await github.rest.issues.addAssignees({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              assignees: [commenter]
            });

            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              body: `🎉 **Issue Assigned!**\n\nHi @${commenter}, this issue has been successfully assigned to you! \n\n🚀 **Next Steps:**\n- Create a new branch for your edits.\n- Link your PR to this issue (e.g. \`Closes #${issueNumber}\`).\n- Submit your PR within **3 days** to avoid automatic expiration and release back to the community.\n\nHappy Coding! 💻✨`
            });
